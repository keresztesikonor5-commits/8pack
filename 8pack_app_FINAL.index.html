<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f14;--bg2:#111820;--bg3:#1a2535;--card:#151e2b;
  --blue:#2e86c1;--green:#27ae60;--orange:#e67e22;--gold:#f0c040;--red:#c0392b;
  --gray:#5a7a99;--light:#cdd6e0;--white:#f0f4f8;
  --push:#1a3a5c;--pull:#1a3d2a;--rest:#2d1a00;--finish:#1f3a1f;
}
html,body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{background:linear-gradient(180deg,#060b10 0%,var(--bg) 100%);padding:50px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.brand{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;background:linear-gradient(135deg,#fff 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.countdown-box{text-align:right}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);line-height:1}
.countdown-lbl{font-size:0.65rem;color:var(--gray);text-transform:uppercase;letter-spacing:1.5px}
.prog-wrap{margin-top:2px}
.prog-track{height:4px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width 0.6s ease}
.prog-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:0.68rem;color:var(--gray)}

/* NAV */
.nav{display:flex;background:#060b10;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--gray);font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.5px;cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all 0.2s}
.nav-btn svg{display:block;margin:0 auto 3px;width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* SCREENS */
.screen{display:none;padding:14px 14px 90px;animation:fadeUp 0.2s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 8px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;line-height:1}
.stat-lbl{font-size:0.62rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.stat-num.gold{color:var(--gold)}
.stat-num.green{color:var(--green)}
.stat-num.blue{color:var(--blue)}

/* HERO */
.hero{border-radius:16px;padding:18px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.hero.push{background:linear-gradient(135deg,var(--push),#0a1e36);border:1px solid rgba(46,134,193,0.25)}
.hero.pull{background:linear-gradient(135deg,var(--pull),#0a1e12);border:1px solid rgba(39,174,96,0.25)}
.hero.rest{background:linear-gradient(135deg,var(--rest),#1a0d00);border:1px solid rgba(230,126,34,0.25)}
.hero.finish{background:linear-gradient(135deg,var(--finish),#0a140a);border:1px solid rgba(240,192,64,0.4)}
.hero.future{background:var(--bg3);border:1px solid rgba(255,255,255,0.08)}
.hero-tag{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;opacity:0.6;margin-bottom:4px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;line-height:1}
.hero.push .hero-title{color:#5dade2}
.hero.pull .hero-title{color:#58d68d}
.hero.rest .hero-title{color:#f0a500}
.hero.finish .hero-title{color:var(--gold)}
.hero.future .hero-title{color:var(--gray)}
.hero-sub{font-size:0.78rem;color:var(--gray);margin-top:3px}
.hero-pill{position:absolute;right:14px;top:14px;font-size:0.65rem;font-weight:700;padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:0.5px}
.pill-push{background:rgba(46,134,193,0.2);color:#5dade2;border:1px solid rgba(46,134,193,0.3)}
.pill-pull{background:rgba(39,174,96,0.2);color:#58d68d;border:1px solid rgba(39,174,96,0.3)}
.pill-rest{background:rgba(230,126,34,0.2);color:#f0a500;border:1px solid rgba(230,126,34,0.3)}
.pill-finish{background:rgba(240,192,64,0.2);color:var(--gold);border:1px solid rgba(240,192,64,0.3)}

/* SECTION TITLE */
.sec-title{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--gray);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* EXERCISE CARD */
.ex-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:all 0.2s;cursor:pointer;-webkit-user-select:none;user-select:none}
.ex-card:active{transform:scale(0.98)}
.ex-card.done{border-color:rgba(39,174,96,0.3);background:rgba(39,174,96,0.08)}
.ex-card-inner{display:flex;align-items:center;gap:12px;padding:13px 14px}
.check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s;font-size:0.8rem}
.ex-card.done .check{background:var(--green);border-color:var(--green);color:#fff}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:0.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-card.done .ex-name{opacity:0.5;text-decoration:line-through}
.ex-meta{font-size:0.72rem;color:var(--gray);margin-top:1px}
.ex-tip{font-size:0.68rem;color:#5dade2;margin-top:2px;font-style:italic}
.timer-btn{flex-shrink:0;background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.25);color:var(--gold);border-radius:8px;padding:6px 10px;font-size:0.7rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.timer-btn:active{transform:scale(0.95);background:rgba(240,192,64,0.2)}

/* DONE BANNER */
.done-banner{background:linear-gradient(135deg,rgba(39,174,96,0.15),rgba(30,132,73,0.08));border:1px solid rgba(39,174,96,0.35);border-radius:14px;padding:20px;text-align:center;margin-top:8px}
.done-banner-big{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:#58d68d;letter-spacing:2px}
.done-banner-sub{font-size:0.78rem;color:var(--gray);margin-top:4px}
.beast-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#1e8449,#145a32);color:white;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:14px;letter-spacing:0.5px;transition:all 0.2s}
.beast-btn:active{transform:scale(0.97)}

/* REST DAY */
.rest-day-card{background:linear-gradient(135deg,var(--rest),#180d00);border:1px solid rgba(230,126,34,0.3);border-radius:16px;padding:20px}
.rest-day-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:#f0a500;letter-spacing:2px}
.rest-day-card p{font-size:0.82rem;color:var(--gray);margin-top:6px;line-height:1.5}
.rest-task{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid rgba(255,255,255,0.06);cursor:pointer;-webkit-user-select:none;user-select:none}
.rest-task:active{opacity:0.7}
.rest-icon{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
.rest-task-name{font-size:0.88rem}

/* CALENDAR */
.cal-item{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px}
.cal-item.today-cal{border-color:var(--gold);box-shadow:0 0 0 1px rgba(240,192,64,0.3)}
.cal-item.past-miss{opacity:0.45}
.cal-date{width:38px;flex-shrink:0;text-align:center}
.cal-day-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1;color:var(--white)}
.cal-month{font-size:0.6rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
.cal-div{width:1px;height:32px;background:rgba(255,255,255,0.07);flex-shrink:0}
.cal-info{flex:1}
.cal-type{font-size:0.85rem;font-weight:600}
.cal-sub{font-size:0.68rem;color:var(--gray);margin-top:1px}
.cal-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ind-done{background:#27ae60}
.ind-today{background:var(--gold)}
.ind-upcoming{background:rgba(255,255,255,0.15)}
.ind-missed{background:var(--red)}
.ind-rest{background:var(--orange)}
.ind-finish{background:var(--gold)}

/* EXERCISES REF */
.exref-section{margin-bottom:20px}
.exref-header{padding:12px 14px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;border-radius:12px 12px 0 0}
.exref-header.push{background:var(--push);color:#5dade2;border-bottom:2px solid var(--blue)}
.exref-header.pull{background:var(--pull);color:#58d68d;border-bottom:2px solid var(--green)}
.exref-header.rest-h{background:var(--rest);color:#f0a500;border-bottom:2px solid var(--orange)}
.exref-header.finish-h{background:var(--finish);color:var(--gold);border-bottom:2px solid var(--gold)}
.exref-row{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-top:none;padding:11px 14px;display:flex;gap:10px}
.exref-row:last-child{border-radius:0 0 12px 12px}
.exref-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gray);width:18px;flex-shrink:0;margin-top:1px}
.exref-body .rname{font-size:0.88rem;font-weight:600}
.exref-body .rtarget{font-size:0.68rem;color:var(--gray);margin-top:1px}
.exref-body .rsets{font-size:0.72rem;color:var(--gold);font-weight:600;margin-top:2px}
.exref-body .rtip{font-size:0.68rem;color:#5dade2;font-style:italic;margin-top:2px}

/* REST TIMER OVERLAY */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.timer-overlay.show{display:flex;animation:fadeUp 0.2s ease}
.timer-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--gray);margin-bottom:20px;text-transform:uppercase}
.timer-ring-wrap{position:relative;width:200px;height:200px;margin-bottom:24px}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.timer-bg-circle{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:10}

  {id:'c2',n:'Súlyzós orosz csavarás',d:'3 kör × 20 fordítás (lassan)',t:'Oldalsó hasizmok',rest:45},
  {id:'c3',n:'RKC Plánk',d:'3 kör × 45 mp tartás',t:'Mély core izmok',rest:30},
  {id:'c4',n:'V-Up',d:'3 kör × 15 ism',t:'Teljes hasizom burnout',rest:45},
];

const REST_TASKS=[
  {id:'rt0',n:'Stomach Vacuum reggel',icon:'🫁'},
  {id:'rt1',n:'20–30 perc séta',icon:'🚶'},
  {id:'rt2',n:'Nyújtás 10+ perc',icon:'🧘'},
  {id:'rt3',n:'3–4 liter víz',icon:'💧'},
  {id:'rt4',n:'Fehérje: 130g+ ma is!',icon:'🥩'},
];

const HU_DAYS=['Vasárnap','Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat'];
const HU_M=['jan','feb','már','ápr','máj','jún','júl','aug','szep','okt','nov','dec'];

// ===== STORAGE (persistent - túléli a cache törlést) =====
// Elsődleges: window.storage (Claude persistent storage)
// Tartalék: localStorage

async function saveDay(dateKey, data) {
  const json = JSON.stringify(data);
  // Try persistent storage first
  if (window.storage) {
    try { await window.storage.set('8pack:' + dateKey, json); return; } catch(e){}
  }
  try { localStorage.setItem('8pack:' + dateKey, json); } catch(e){}
}

async function loadDay(dateKey) {
  if (window.storage) {
    try {
      const r = await window.storage.get('8pack:' + dateKey);
      if (r && r.value) return JSON.parse(r.value);
    } catch(e){}
  }
  try {
    const v = localStorage.getItem('8pack:' + dateKey);
    if (v) return JSON.parse(v);
  } catch(e){}
  return {};
}

async function loadAllDays() {
  const out = {};
  for (const s of SCHED) {
    out[s.d] = await loadDay(s.d);
  }
  return out;
}

// State cache
let STATE = {};

async function initState() {
  STATE = await loadAllDays();
  renderAll();
}

async function toggle(dateKey, exId) {
  if (!STATE[dateKey]) STATE[dateKey] = {};
  STATE[dateKey][exId] = !STATE[dateKey][exId];
  await saveDay(dateKey, STATE[dateKey]);
  renderAll();
  if (STATE[dateKey][exId]) showToast('✓  Kész!');
}

async function markAll(dateKey, exercises) {
  if (!STATE[dateKey]) STATE[dateKey] = {};
  exercises.forEach(e => STATE[dateKey][e.id] = true);
  await saveDay(dateKey, STATE[dateKey]);
  renderAll();
  showToast('🔥  Beast mode! Minden kész!', true);
}

// ===== HELPERS =====
function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getExs(type) {
  if (type==='push'||type==='finish') return PUSH;
  if (type==='pull') return PULL;
  return [];
}

function isDayDone(sched) {
  const s = STATE[sched.d] || {};
  if (sched.t === 'rest') return Object.values(s).some(v=>v);
  const exs = getExs(sched.t);
  return exs.length > 0 && exs.every(e => s[e.id]);
}

function countDone() { return SCHED.filter(s => isDayDone(s)).length; }

function calcStreak() {
  const tk = todayKey();
  let streak = 0;
  const todayIdx = SCHED.findIndex(s => s.d === tk);
  const upTo = todayIdx >= 0 ? todayIdx : SCHED.length - 1;
  for (let i = upTo; i >= 0; i--) {
    if (isDayDone(SCHED[i])) streak++;
    else break;
  }
  return streak;
}

// ===== RENDER =====
function renderAll() {
  renderHeader();
  renderToday();
  renderCalendar();
  renderExercises();
}

function renderHeader() {
  const today = new Date(); today.setHours(0,0,0,0);
  const balaton = new Date('2026-06-17'); balaton.setHours(0,0,0,0);
  const diff = Math.ceil((balaton - today) / 86400000);
  document.getElementById('cdn').textContent = diff > 0 ? diff + ' nap' : diff === 0 ? 'MA! 🏖️' : 'Vége!';
  const done = countDone();
  const pct = Math.round(done/19*100);
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pm-done').textContent = done + ' / 19 nap teljesítve';
  document.getElementById('pm-pct').textContent = pct + '%';
}

function renderToday() {
  const el = document.getElementById('today-content');
  const tk = todayKey();
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date('2026-05-30'); start.setHours(0,0,0,0);
  const end = new Date('2026-06-17'); end.setHours(0,0,0,0);
  const sched = SCHED.find(s => s.d === tk);
  const s = STATE[tk] || {};
  const done = countDone();
  const streak = calcStreak();

  let html = `<div class="stats-row">
    <div class="stat-box"><div class="stat-num gold">${done}</div><div class="stat-lbl">Nap kész</div></div>
    <div class="stat-box"><div class="stat-num green">${streak}🔥</div><div class="stat-lbl">Sorozat</div></div>
    <div class="stat-box"><div class="stat-num blue">${19-done}</div><div class="stat-lbl">Van még</div></div>
  </div>`;

  if (!sched) {
    if (today < start) {
      html += `<div class="hero future"><div class="hero-tag">Program indul</div><div class="hero-title" style="color:var(--gray)">2026 MÁJ 30</div><div class="hero-sub">Pihenj, egyél sokat, és készülj! 💪</div></div>`;
    } else {
      html += `<div class="hero finish"><div class="hero-tag">Program lezárva</div><div class="hero-title">BALATON! 🏖️</div><div class="hero-sub">Mutasd meg azt a testet!</div></div>`;
    }
    el.innerHTML = html;
    return;
  }

  const heroType = sched.t === 'finish' ? 'finish' : sched.t;
  const pillMap = {push:'pill-push',pull:'pill-pull',rest:'pill-rest',finish:'pill-finish'};
  const dayName = HU_DAYS[new Date().getDay()];
  const dayNum = new Date().getDate();

  html += `<div class="hero ${heroType}">
    <div class="hero-pill ${pillMap[heroType] || 'pill-push'}">${sched.t.toUpperCase()}</div>
    <div class="hero-tag">${dayName} · ${HU_M[new Date().getMonth()]} ${dayNum}.</div>
    <div class="hero-title">${sched.l}</div>
    <div class="hero-sub">${sched.s}</div>
  </div>`;

  if (sched.t === 'rest') {
    html += `<div class="rest-day-card"><h2>IZOMSZINTÉZIS NAP 😴</h2>
      <p>Az izmaid <strong>most nőnek</strong> – nem edzés közben!<br>Koppints a feladatokra ahogy végzel velük.</p>
      <div style="margin-top:12px">`;
    REST_TASKS.forEach(t => {
      const done = s[t.id];
      html += `<div class="rest-task" onclick="toggle('${tk}','${t.id}')">
        <div class="check" style="${done?'background:var(--green);border-color:var(--green);color:#fff':''}">${done?'✓':''}</div>
        <span class="rest-icon">${t.icon}</span>
        <span class="rest-task-name" style="${done?'text-decoration:line-through;opacity:0.5':''}">${t.n}</span>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    const exs = getExs(sched.t);
    const allDone = exs.every(e => s[e.id]);
    const doneCount = exs.filter(e => s[e.id]).length;

    html += `<div class="sec-title">Gyakorlatok (${doneCount}/${exs.length} kész)</div>`;
    exs.forEach(e => {
      const done = s[e.id];
      html += `<div class="ex-card ${done?'done':''}" onclick="toggle('${tk}','${e.id}')">
        <div class="ex-card-inner">
          <div class="check">${done?'✓':''}</div>
          <div class="ex-body">
            <div class="ex-name">${e.n}</div>
            <div class="ex-meta">${e.d} · <span style="color:var(--gray)">${e.t}</span></div>
            ${e.tip?`<div class="ex-tip">💡 ${e.tip}</div>`:''}
          </div>
          <button class="timer-btn" onclick="event.stopPropagation();openTimer('${e.n}',${e.rest})">${e.rest}s ⏱</button>
        </div>
      </div>`;
    });

    if (!allDone) {
      html += `<button class="beast-btn" onclick="markAll('${tk}', ${JSON.stringify(exs).replace(/'/g,'\\\'')})">⚡ Mind kész – Beast mode!</button>`;
    } else {
      html += `<div class="done-banner">
        <div class="done-banner-big">💪 MAI EDZÉS KÉSZ!</div>
        <div class="done-banner-sub">Egyél fehérjét, igyál vizet, aludj jól! Holnap folytatjuk.</div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

function renderCalendar() {
  const el = document.getElementById('cal-content');
  const tk = todayKey();
  const today = new Date(); today.setHours(0,0,0,0);
  let html = `<div class="sec-title">Program naptár · máj 30 – jún 17</div>`;

  SCHED.forEach((sched, i) => {
    const date = new Date(sched.d + 'T12:00:00');
    date.setHours(0,0,0,0);
    const isPast = date < today;
    const isToday = sched.d === tk;
    const done = isDayDone(sched);
    const isMissed = isPast && !done && !isToday;

    let indClass = 'ind-upcoming';
    if (done) indClass = 'ind-done';
    else if (isToday) indClass = 'ind-today';
    else if (isMissed) indClass = 'ind-missed';
    else if (sched.t === 'rest') indClass = 'ind-rest';
    else if (sched.t === 'finish') indClass = 'ind-finish';

    let typeColor = '';
    if (sched.t === 'push') typeColor = 'color:#5dade2';
    else if (sched.t === 'pull') typeColor = 'color:#58d68d';
    else if (sched.t === 'rest') typeColor = 'color:#f0a500';
    else if (sched.t === 'finish') typeColor = 'color:var(--gold)';

    html += `<div class="cal-item ${isToday?'today-cal':''} ${isMissed?'past-miss':''}">
      <div class="cal-date"><div class="cal-day-num">${date.getDate()}</div><div class="cal-month">${HU_M[date.getMonth()]}</div></div>
      <div class="cal-div"></div>
      <div class="cal-info">
        <div class="cal-type" style="${typeColor}">${sched.l}${isToday?' ← MA':''}</div>
        <div class="cal-sub">${HU_DAYS[date.getDay()]} · ${done?'✓ Teljesítve':isMissed?'⚠ Kihagyott':isToday?'Folyamatban':'Közelgő'}</div>
      </div>
      <div class="cal-indicator ${indClass}"></div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderExercises() {
  const el = document.getElementById('ex-content');
  function rows(exs) {
    return exs.map((e,i) => `<div class="exref-row">
      <div class="exref-num">${i+1}</div>
      <div class="exref-body">
        <div class="rname">${e.n}</div>
        <div class="rtarget">${e.t}</div>
        <div class="rsets">${e.d}</div>
        ${e.tip?`<div class="rtip">💡 ${e.tip}</div>`:''}
      </div>
    </div>`).join('');
  }

  el.innerHTML = `
    <div class="exref-section">
      <div class="exref-header push">🔵 PUSH NAP – Váll · Tricepsz · Mell · Core</div>${rows(PUSH)}
    </div>
    <div class="exref-section">
      <div class="exref-header pull">🟢 PULL NAP – Bicepsz · Hát · Alkar · Core</div>${rows(PULL)}
    </div>
    <div class="exref-section">
      <div class="exref-header rest-h">🟠 PIHENŐNAP – Aktív regeneráció</div>
      ${REST_TASKS.map((t,i) => `<div class="exref-row"><div class="exref-num">${t.icon}</div><div class="exref-body"><div class="rname">${t.n}</div></div></div>`).join('')}
    </div>
    <div class="exref-section">
      <div class="exref-header finish-h">🎯 FINISH FÁZIS – Jún 14–17</div>
      <div class="exref-row"><div class="exref-num">1</div><div class="exref-body"><div class="rname">Só minimalizálás</div><div class="rtarget">Feldolgozott étel, só, szószok ki</div></div></div>
      <div class="exref-row"><div class="exref-num">2</div><div class="exref-body"><div class="rname">Víz: 4 liter/nap</div><div class="rtarget">Öblíti a szövetek közötti vizet</div></div></div>
      <div class="exref-row"><div class="exref-num">3</div><div class="exref-body"><div class="rname">Szénhidrát normál</div><div class="rtarget">Tölti az izmokat, nem a bőrt alá</div></div></div>
      <div class="exref-row"><div class="exref-num">4</div><div class="exref-body"><div class="rname">Edzés folytatódik</div><div class="rtarget">Az izmokat feszesen kell tartani!</div></div></div>
    </div>`;
}

// ===== NAVIGATION =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  ['nav-today','nav-calendar','nav-exercises','bot-today','bot-calendar','bot-exercises'].forEach(id => {
    const el = document.getElementById(id); if(el) el.classList.remove('active');
  });
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('bot-' + name).classList.add('active');
}

// ===== TIMER =====
let timerInterval = null;
let timerTotal = 60;
let timerLeft = 60;
const CIRC = 2 * Math.PI * 90; // 565.5

function openTimer(exName, secs) {
  timerTotal = secs || 60;
  timerLeft = timerTotal;
  document.getElementById('timer-ex-name').textContent = exName + ' – Pihenő';
  document.getElementById('timer-overlay').classList.add('show');
  // highlight active preset
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.remove('active-preset');
    if (parseInt(b.textContent) === secs || (b.textContent === '2 perc' && secs === 120)) b.classList.add('active-preset');
  });
  updateTimerDisplay();
  startTimer();
}

function setTimer(secs) {
  clearInterval(timerInterval);
  timerTotal = secs;
  timerLeft = secs;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
  event.target.classList.add('active-preset');
  updateTimerDisplay();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerLeft--;
    updateTimerDisplay();
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      timerDone();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-display').textContent = timerLeft;
  const pct = timerLeft / timerTotal;
  const offset = CIRC * (1 - pct);
  const ring = document.getElementById('timer-ring');
  ring.style.strokeDashoffset = offset;
  if (timerLeft <= 10) ring.style.stroke = '#e74c3c';
  else if (timerLeft <= 20) ring.style.stroke = '#e67e22';
  else ring.style.stroke = 'var(--gold)';
}

function timerDone() {
  document.getElementById('timer-ring').style.stroke = '#27ae60';
  document.getElementById('timer-display').textContent = '✓';
  showToast('⏱ Pihenő kész! Következő sor!', true);
  setTimeout(() => closeTimer(), 1500);
}

function skipTimer() {
  clearInterval(timerInterval);
  closeTimer();
}

function closeTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('show');
  timerLeft = timerTotal;
  updateTimerDisplay();
}

// ===== TOAST =====
let toastT;
function showToast(msg, gold) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (gold ? ' gold' : '') + ' show';
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== INIT =====
initState();
</script>

<script>
let deferredPrompt;
const banner = document.getElementById('install-banner');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.style.display = 'flex';
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    banner.style.display = 'none';
    showToast('✓ App telepítve! Keresd a kezdőképernyőn 🏖️', true);
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  banner.style.display = 'none';
});

// Service worker for offline use
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = '8pack-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
